version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: propflow
      POSTGRES_PASSWORD: propflow
      POSTGRES_DB: propflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: propflow
      RABBITMQ_DEFAULT_PASS: propflow

volumes:
  postgres_data:
